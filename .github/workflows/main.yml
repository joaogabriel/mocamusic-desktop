name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-windows-release:
    permissions:
      contents: write

    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # Rust cache
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Read release notes
      - name: Read release notes
        id: release_notes
        run: |
          $notes = Get-Content RELEASE_NOTES.md -Raw
          $notes = $notes -replace "`n", "%0A" -replace "`r", "%0D"
          echo "body=$notes" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # Download yt-dlp and ffmpeg sidecars
      - name: Download sidecar binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null

          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

          $ffmpegZip = "ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/$ffmpegZip" `
            -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $ffmpegExe.FullName -Destination "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Remove-Item -Path $ffmpegZip -Force
          Remove-Item -Path "ffmpeg-extract" -Recurse -Force

      # Build + Release
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tagName: v__VERSION__
          releaseName: "Moca Music v__VERSION__"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false