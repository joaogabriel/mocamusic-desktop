name: Build Test (Windows)

on:
  push:
    branches:
      - windows-log-test

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null

          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

          $ffmpegZip = "ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/$ffmpegZip" `
            -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $ffmpegExe.FullName -Destination "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Remove-Item -Path $ffmpegZip -Force
          Remove-Item -Path "ffmpeg-extract" -Recurse -Force

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: moca-music-windows-test
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 3
